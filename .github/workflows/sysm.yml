name: symx I/O throttle repro

# Faithful reproduction of symx's SLOW step, run as a GHA job (inherits the runner
# service's I/O policy). Prior runs showed: in-job timing is intermittent (11s vs
# 141s) and `ipsw extract --dyld` is CPU-bound on AEA decrypt — NOT symx's slow path.
# symx's actual slow step is `ipsw mount sys` + symsorter reading the whole mounted
# volume (symsorter sat in uninterruptible I/O wait, CPU idle). So THIS reproduces
# that exact pair and samples the stuck symsorter.
#
# IMPORTANT: only ever spindump a SPECIFIC pid — a whole-system spindump suspends
# the runner agent and gets the job SIGTERM'd (exit 143). No Sentry secrets / GCS.

on:
  workflow_dispatch:
    inputs:
      mac_version: { description: "macOS IPSW version", type: string, default: "26.5" }
      ipsw_version: { description: "blacktop ipsw version", type: string, default: "3.1.685" }

permissions:
  contents: read

jobs:
  throttle-repro:
    name: symx throttle repro (tahoe-xl)
    runs-on:
      labels: [bitrise_pool_name:Bitrise-M4Pro, machine_debug_type:enabled]
    steps:
      - name: Environment + who launched the runner (QoS source)
        run: |
          set +e
          echo "runner=$(hostname) os=$(sw_vers -productVersion) cores=$(sysctl -n hw.ncpu) mem=$(( $(sysctl -n hw.memsize)/1024/1024 ))MiB model=$(sysctl -n hw.model)"
          echo "::group::runner process parent chain (QoS is inherited down this chain)"
          pid=$(pgrep -f 'Runner.Listener run' | head -1)
          while [ -n "$pid" ] && [ "$pid" != 1 ]; do
            line=$(ps -o pid,ppid,pri,nice,comm -p "$pid" | tail -1)
            echo "  $line"
            pid=$(ps -o ppid= -p "$pid" | tr -d ' ')
          done
          echo "--- launchd services (bitrise/runner/actions) ---"
          sudo launchctl list 2>/dev/null | grep -iE 'runner|action|bitrise'
          for lbl in $(sudo launchctl list 2>/dev/null | grep -iE 'runner|action|bitrise' | awk '{print $3}'); do
            echo "  print system/$lbl:"; sudo launchctl print "system/$lbl" 2>/dev/null | grep -iE 'nice|priority|qos|processtype|iopolicy|throttl|darwinbg|lowpriority' | sed 's/^/    /'
          done
          echo "::endgroup::"

      - name: Install ipsw + symsorter
        run: |
          set -euo pipefail
          V="${{ inputs.ipsw_version }}"
          curl -LsSf --retry 6 --retry-delay 10 --retry-all-errors \
            "https://github.com/blacktop/ipsw/releases/download/v${V}/ipsw_${V}_macOS_universal.tar.gz" -o /tmp/ipsw.tgz
          sudo tar -xzf /tmp/ipsw.tgz -C /usr/local/bin ipsw && sudo chmod +x /usr/local/bin/ipsw
          curl -LsSf --retry 6 --retry-all-errors https://github.com/getsentry/symbolicator/releases/latest/download/symsorter-Darwin-universal -o /tmp/symsorter
          sudo install -m 0755 /tmp/symsorter /usr/local/bin/symsorter
          ipsw version; symsorter --version

      - name: Download public macOS IPSW (excluded from timings)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/repro"
          ipsw download ipsw --device VirtualMac2,1 --version "${{ inputs.mac_version }}" --confirm --output "$HOME/repro"
          ls -lh "$HOME/repro"/*.ipsw

      - name: "FAITHFUL repro — ipsw mount sys + symsorter (symx's slow step)"
        run: |
          set +e   # tolerate non-zero so a sub-step can't SIGTERM the job
          MAC=$(ls "$HOME/repro"/UniversalMac_*.ipsw | head -1)
          MP=/tmp/sys_mount; rm -rf "$MP" /tmp/symbols; mkdir -p "$MP" /tmp/symbols

          echo ">>> ipsw mount sys  (symx 'IPSW mount')…"
          sudo ipsw mount sys "$MAC" -V --mount-point "$MP" >/tmp/mount.log 2>&1 &
          mpid=$!
          t0=$(date +%s); ready=""
          for i in $(seq 1 600); do grep -qiE 'Mounted|Press Ctrl' /tmp/mount.log 2>/dev/null && { ready=1; break; }; sleep 1; done
          t1=$(date +%s)
          echo "RESULT  ipsw mount sys ready: $((t1-t0))s   [healthy ≈ 12-20s]"
          tail -2 /tmp/mount.log | sed 's/^/  mount> /'
          MOUNT=$(grep -oE "/(private/)?tmp/[^ ']*\.mount" /tmp/mount.log | head -1); MOUNT="${MOUNT:-$MP}"

          if [ -n "$ready" ]; then
            echo ">>> symsorter over the mounted volume (the visionOS-style read)…"
            symsorter -zz -o /tmp/symbols --prefix macos --bundle-id repro --ignore-errors "$MOUNT" >/tmp/symsort.log 2>&1 &
            spid=$!
            # TARGETED spindump of symsorter once it's been running ~20s (NOT whole-system)
            ( sleep 20; kill -0 "$spid" 2>/dev/null && sudo spindump "$spid" 10 -noProcessingWhileSampling -file /tmp/symsorter-spindump.txt >/dev/null 2>&1 ) &
            t0=$(date +%s); wait "$spid"; t1=$(date +%s)
            echo "RESULT  symsorter read: $((t1-t0))s"
          fi
          # teardown (symx-style)
          sudo kill -INT "$mpid" 2>/dev/null; sleep 3; kill -0 "$mpid" 2>/dev/null && sudo kill -9 "$mpid" 2>/dev/null

          echo "::group::symsorter spindump — throttle / blocked-state check"
          if [ -f /tmp/symsorter-spindump.txt ]; then
            echo "throttle-frame matches: $(grep -ic -E 'throttle_lowpri_io|_throttle_io' /tmp/symsorter-spindump.txt)"
            grep -n -i -E 'throttle_lowpri_io|_throttle_io|vn_read|cluster_read|apfs|spec_read|read ' /tmp/symsorter-spindump.txt | head -25
          else
            echo "(symsorter finished before 20s — fast run this time; re-run for a slow one)"
          fi
          echo "::endgroup::"

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "Read the two RESULT lines + the symsorter spindump."
          echo " - mount-ready and/or symsorter-read in the minutes (vs ~15-50s healthy) = reproduced."
          echo " - symsorter blocked in *_throttle_io / cluster_read with CPU idle = I/O throttling."
          echo " - Environment step shows the runner's parent chain — the QoS source to fix."
