name: iOS Simulator Build with EAS + RN Build Cache

on:
  # Adjust triggers to match your needs
  workflow_dispatch:

jobs:
  ios-simulator-eas-cache:
    # Bitrise Runner (macOS) — update the label to match your self-hosted runner config
    runs-on:
      labels: [bitrise_pool_name:Bitrise-M4Pro-GHApp]

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout
      # ---------------------------------------------------------------
      - name: Git Clone
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Activate Bitrise Build Cache for React Native
      #    Must run BEFORE any native build command.
      #    Downloads the CLI and enables Xcode + ccache caching.
      # ---------------------------------------------------------------
      - name: Activate Bitrise Build Cache for React Native
        env:
          BITRISE_BUILD_CACHE_AUTH_TOKEN: ${{ secrets.BITRISE_PAT }}
          BITRISE_BUILD_CACHE_WORKSPACE_ID: ${{ secrets.BITRISE_WORKSPACE_ID }}
        run: |
          set -euxo pipefail
          curl --retry 5 -sSfL \
            'https://raw.githubusercontent.com/bitrise-io/bitrise-build-cache-cli/main/install/installer.sh' \
            | sh -s -- -b /tmp/bin -d
          /tmp/bin/bitrise-build-cache activate react-native

      # ---------------------------------------------------------------
      # 3. Restore npm cache
      # ---------------------------------------------------------------
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      # ---------------------------------------------------------------
      # 4. npm install
      # ---------------------------------------------------------------
      - name: npm install
        run: npm install

      # ---------------------------------------------------------------
      # 4. npm install (includes eas-cli if listed as devDependency;
      #    otherwise install it globally below)
      # ---------------------------------------------------------------
      - name: npm install
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ---------------------------------------------------------------
      # 5. EAS local build for iOS Simulator
      # Requires:
      #   - eas.json with a profile that sets ios.simulator: true
      #   - EXPO_TOKEN secret (from expo.dev → Access Tokens)
      # ---------------------------------------------------------------
      - name: EAS Build (iOS Simulator, local)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Keep the EAS working dir around so we can grab Xcode logs on failure
          EAS_LOCAL_BUILD_SKIP_CLEANUP: "1"
        run: |
          set -euxo pipefail
          bitrise-build-cache react-native run \
            eas build \
              --platform ios \
              --profile simulator \
              --local \
              --non-interactive \
              --output ./build/app.tar.gz

      # ---------------------------------------------------------------
      # 9. Verify build output exists and upload artifact
      # ---------------------------------------------------------------
      - name: Collect .app artifact
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "BitriseExpo53Codepush.app" -path "*/Release-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in DerivedData"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p ./build
          cp -R "$APP_PATH" ./build/
 
      - name: Upload Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ./build/app.tar.gz
